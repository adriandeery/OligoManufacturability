name: Keep Streamlit app alive

on:
  schedule:
    - cron: "0 */2 * * *"   
  workflow_dispatch:    # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: curl -s -o /dev/null -w "%{http_code}" https://oligosynthesis.streamlit.app/